    <!-- FAQ structured data for rich snippets -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is this IQ test free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Taking the full 40-question IQ test is free. Your composite IQ score, percentile rank, and 4-domain breakdown are unlocked for $2.99, which also includes a written cognitive analysis."
          }
        },
        {
          "@type": "Question",
          "name": "How accurate is this IQ test?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Acuity uses Computer Adaptive Testing (CAT), the same methodology used in professionally administered assessments. Questions are calibrated to your ability level in real time across four cognitive domains, producing a normed IQ score with a mean of 100 and standard deviation of 15."
          }
        },
        {
          "@type": "Question",
          "name": "How long does the IQ test take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The test consists of 40 adaptive questions and takes approximately 20 minutes to complete. There is no time limit per question."
          }
        },
        {
          "@type": "Question",
          "name": "What does my IQ score mean?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "IQ scores are normed with a mean of 100 and a standard deviation of 15. A score of 90–109 is Average, 110–119 is High Average, 120–129 is Superior, and 130+ is Very Superior. Your result includes a percentile rank showing how you compare to the general population."
          }
        },
        {
          "@type": "Question",
          "name": "What is a good IQ score?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The average IQ score is 100. Scores above 115 place you in the top ~16% of the population, and scores above 130 place you in the top ~2%. Acuity measures scores from 40 to 160 across four cognitive domains."
          }
        },
        {
          "@type": "Question",
          "name": "What cognitive domains does the test measure?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Acuity measures four cognitive domains: Pattern Recognition (identifying abstract rules and visual sequences), Verbal Reasoning (analogies, logic, and vocabulary), Numerical Reasoning (number series and quantitative problem solving), and Spatial Reasoning (3D visualisation and mental rotation)."
          }
        }
      ]
    }
    </script>
